name: Z.AI Farm Automation (Generate Links)

on:
  # Run every 30 minutes
  schedule:
    - cron: '*/30 * * * *'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  run-farm:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed so the script can push links.json to the repo

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Need full history to push commits back

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install System Dependencies (Chrome & Xvfb)
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb google-chrome-stable

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Automation Farm (Raw / Monos)
      env:
        # Pass GitHub token to Git for pushing
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Set up git auth for pushing
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Run farm script with virtual display
        export DISPLAY=:99
        xvfb-run -a python -m automation.main --stage full --monos --raw --git
